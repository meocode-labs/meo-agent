name: Release

on:
  push:
    branches:
      - master
      - main

permissions:
  contents: write

jobs:
  build:
    name: Build and Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install --include=dev

      - name: Verify pkg binary is available
        run: |
          if [ ! -x node_modules/.bin/pkg ]; then
            echo "::error::pkg binary not found in node_modules/.bin/"
            exit 1
          fi
          ./node_modules/.bin/pkg --version

      - name: Read version from package.json
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="v${VERSION}"
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT
          echo "TAG=${TAG}" >> $GITHUB_OUTPUT
          echo "Will release as ${TAG}"

      - name: Check if tag already exists
        id: check_tag
        run: |
          if git rev-parse "v${{ steps.version.outputs.VERSION }}" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Tag v${{ steps.version.outputs.VERSION }} already exists, skipping release"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Build binaries
        if: steps.check_tag.outputs.exists == 'false'
        run: ./node_modules/.bin/pkg .

      - name: Verify binaries
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          echo "=== Build artifacts ==="
          ls -la dist/
          file dist/*

      - name: Generate release notes
        if: steps.check_tag.outputs.exists == 'false'
        id: notes
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          PREV_TAG=$(git tag --sort=-version:refname | sed -n '2p')

          if [ -n "$PREV_TAG" ]; then
            RANGE="${PREV_TAG}..HEAD"
          else
            RANGE=""
          fi

          {
            echo "## meo-agent v${VERSION}"
            echo ""
            echo "**Release date:** $(date -u '+%Y-%m-%d %H:%M UTC')"
            echo ""
            echo "### Downloads"
            echo ""
            echo "| Platform | File |"
            echo "|----------|------|"
            echo "| Windows  | \`meo-agent-win.exe\` |"
            echo "| macOS    | \`meo-agent-macos\` |"
            echo "| Linux    | \`meo-agent-linux\` |"
            echo ""
            echo "### Installation"
            echo ""
            echo "\`\`\`bash"
            echo "# npm (cross-platform)"
            echo "npm install -g meo-agent"
            echo ""
            echo "# Static binary"
            echo "chmod +x meo-agent-macos && ./meo-agent-macos <URL>"
            echo "\`\`\`"
            echo ""
            echo "### What's New"
            echo ""

            if [ -n "$RANGE" ]; then
              echo "**Commits since ${PREV_TAG}:**"
              echo ""
              git log "${RANGE}" --pretty=format:"- %s (%h) — %an" --no-merges
            else
              echo "**Initial release:**"
              echo ""
              git log --pretty=format:"- %s (%h) — %an" --no-merges
            fi
            echo ""
            echo ""
            echo "### Statistics"
            echo ""

            if [ -n "$RANGE" ]; then
              STATS=$(git diff --stat "${RANGE}")
            else
              STATS=$(git log --pretty=format: --shortstat | head -1)
            fi
            echo "\`\`\`"
            echo "${STATS}"
            echo "\`\`\`"
            echo ""
            echo "---"
            echo "_Auto-generated by GitHub Actions_"
          } > release_notes.md

          cat release_notes.md
          echo "notes_file=release_notes.md" >> $GITHUB_OUTPUT

      - name: Create Release
        if: steps.check_tag.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.TAG }}
          name: meo-agent v${{ steps.version.outputs.VERSION }}
          body_path: release_notes.md
          draft: false
          prerelease: false
          generate_release_notes: true
          files: dist/meo-agent-win.exe
          if-no-files-found: ignore

      - name: Upload macOS binary
        if: steps.check_tag.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.TAG }}
          files: dist/meo-agent-macos
          if-no-files-found: ignore

      - name: Upload Linux binary
        if: steps.check_tag.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.TAG }}
          files: dist/meo-agent-linux
          if-no-files-found: ignore